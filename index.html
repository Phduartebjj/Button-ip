<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetInspect</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">

        <h1>NetInspect</h1>
        <p class="subtitle">
            Discover your public IP and network information.
        </p>

        <section class="card">

            <h2>Your IP Address</h2>

            <div id="ip" class="ip-address">
                Loading...
            </div>

            <button onclick="copyIp()">
                Copy IP
            </button>

            <div class="info">

                <div>
                    <span>Country</span>
                    <strong id="country">-</strong>
                </div>

                <div>
                    <span>Region</span>
                    <strong id="region">-</strong>
                </div>

                <div>
                    <span>City</span>
                    <strong id="city">-</strong>
                </div>

                <div>
                    <span>ISP</span>
                    <strong id="isp">-</strong>
                </div>

            </div>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
